<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block Blast Pro Ultimate</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --grid-bg: #1e293b;
            --cell-empty: #334155;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 420px;
            padding: 10px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 15px;
        }
        .score-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 12px;
            text-align: center;
            min-width: 100px;
        }
        .score-label { font-size: 12px; color: #94a3b8; text-transform: uppercase; font-weight: bold;}
        .score-val { font-size: 24px; font-weight: 900; color: #fbbf24; }
        
        #streak-banner {
            font-size: 20px;
            font-weight: bold;
            color: #f43f5e;
            height: 30px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(244,63,94,0.6);
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        /* Bàn cờ 8x8 */
        #grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            gap: 4px;
            width: 100%;
            aspect-ratio: 1;
            background-color: var(--grid-bg);
            padding: 6px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .cell {
            background-color: var(--cell-empty);
            border-radius: 6px;
            transition: background-color 0.15s, transform 0.1s;
        }
        .cell.clear-anim {
            transform: scale(0);
            background-color: #ffffff !important;
        }

        /* Khay chứa 3 khối */
        #dock {
            display: flex;
            justify-content: space-around;
            align-items: center;
            width: 100%;
            height: 140px;
            margin-top: 25px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 10px 0;
        }
        .dock-slot {
            width: 110px;
            height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .piece {
            display: grid;
            gap: 2px;
            cursor: grab;
            transition: transform 0.1s;
            transform-origin: center center;
        }
        .piece.dragging {
            cursor: grabbing;
            transform: scale(1.15);
            opacity: 0.9;
            position: absolute;
            z-index: 1000;
            pointer-events: none; /* Tránh cản lỗi khi nhấc */
        }
        .p-cell {
            border-radius: 4px;
        }

        /* Màn hình Game Over */
        #game-over-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        #game-over-screen h1 { font-size: 40px; color: #f43f5e; margin-bottom: 10px; }
        #restart-btn {
            background: #2563eb; color: white; border: none;
            padding: 12px 30px; font-size: 18px; font-weight: bold;
            border-radius: 8px; cursor: pointer; margin-top: 20px;
            transition: background 0.2s;
        }
        #restart-btn:hover { background: #1d4ed8; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="header">
        <div class="score-box">
            <div class="score-label">Score</div>
            <div id="score" class="score-val">0</div>
        </div>
        <div id="streak-banner">Combo X1</div>
        <div class="score-box">
            <div class="score-label">Best</div>
            <div id="best-score" class="score-val">0</div>
        </div>
    </div>

    <div id="grid"></div>
    <div id="dock"></div>
</div>

<div id="game-over-screen">
    <h1>GAME OVER</h1>
    <p>Số điểm của bạn: <span id="final-score" style="color:#fbbf24; font-weight:bold;">0</span></p>
    <button id="restart-btn" onclick="resetGame()">Chơi Lại</button>
</div>

<script>
    const GRID_SIZE = 8;
    let gridData = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(null));
    let score = 0;
    let bestScore = localStorage.getItem('block_blast_best') || 0;
    let streak = 0;

    const COLORS = ['#ef4444', '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#06b6d4'];
    const SHAPES = [
        [[1]], // 1 ô
        [[1, 1]], // 2 ô ngang
        [[1], [1]], // 2 ô dọc
        [[1, 1, 1]], // 3 ô ngang
        [[1], [1], [1]], // 3 ô dọc
        [[1, 1], [1, 1]], // Vuông 2x2
        [[1, 1, 1], [0, 1, 0]], // Chữ T
        [[1, 0], [1, 0], [1, 1]], // Chữ L gọn
        [[0, 1], [0, 1], [1, 1]], // Chữ L ngược
    ];

    const gridEl = document.getElementById('grid');
    const dockEl = document.getElementById('dock');
    const scoreEl = document.getElementById('score');
    const bestScoreEl = document.getElementById('best-score');
    const streakEl = document.getElementById('streak-banner');

    // Khởi tạo bàn cờ ban đầu
    function initGrid() {
        gridEl.innerHTML = '';
        for (let r = 0; r < GRID_SIZE; r++) {
            for (let c = 0; c < GRID_SIZE; c++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.dataset.row = r;
                cell.dataset.col = c;
                gridEl.appendChild(cell);
            }
        }
        bestScoreEl.innerText = bestScore;
    }

    // Vẽ lại trạng thái màu sắc trên bàn cờ
    function drawGrid() {
        const cells = document.querySelectorAll('.cell');
        cells.forEach(cell => {
            const r = parseInt(cell.dataset.row);
            const c = parseInt(cell.dataset.col);
            cell.style.backgroundColor = gridData[r][c] ? gridData[r][c] : 'var(--cell-empty)';
        });
    }

    // Sinh ra các khối ở khay dưới (Dock)
    function generateDockPieces() {
        dockEl.innerHTML = '';
        for (let i = 0; i < 3; i++) {
            const slot = document.createElement('div');
            slot.classList.add('dock-slot');
            
            const pieceObj = createPieceElement();
            slot.appendChild(pieceObj);
            dockEl.appendChild(slot);
        }
        // Sau khi sinh khối mới, check ngay xem có bị Game Over lập tức không
        checkGameOver();
    }

    function createPieceElement() {
        const shape = SHAPES[Math.floor(Math.random() * SHAPES.length)];
        const color = COLORS[Math.floor(Math.random() * COLORS.length)];
        
        const piece = document.createElement('div');
        piece.classList.add('piece');
        piece.style.gridTemplateRows = `repeat(${shape.length}, 1fr)`;
        piece.style.gridTemplateColumns = `repeat(${shape[0].length}, 1fr)`;
        piece.dataset.shape = JSON.stringify(shape);
        piece.dataset.color = color;

        // Tính kích thước ô nhỏ trong khối dựa theo tỷ lệ lưới để nhìn cân đối
        const cellSize = Math.floor(gridEl.clientWidth / 8) - 6; 
        
        shape.forEach(row => {
            row.forEach(val => {
                const pCell = document.createElement('div');
                pCell.classList.add('p-cell');
                pCell.style.width = cellSize + 'px';
                pCell.style.height = cellSize + 'px';
                if (val) {
                    pCell.style.backgroundColor = color;
                } else {
                    pCell.style.backgroundColor = 'transparent';
                }
                piece.appendChild(pCell);
            });
        });

        addDragEvents(piece);
        return piece;
    }

    // Xử lý kéo thả nâng cao (Hỗ trợ tốt cả Chuột lẫn Cảm ứng điện thoại)
    function addDragEvents(piece) {
        let active = false;
        let startX, startY;
        
        const handleStart = (e) => {
            active = true;
            piece.classList.add('dragging');
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            const rect = piece.getBoundingClientRect();
            // Độ lệch tâm để ngón tay/chuột không đè khuất khối hình
            piece.dataset.offsetX = clientX - rect.left - (rect.width/2);
            piece.dataset.offsetY = clientY - rect.top - (rect.height * 0.8); 
            
            movePiece(clientX, clientY);
        };

        const handleMove = (e) => {
            if (!active) return;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            movePiece(clientX, clientY);
        };

        const handleEnd = (e) => {
            if (!active) return;
            active = false;
            piece.classList.remove('dragging');
            piece.style.position = '';
            piece.style.left = '';
            piece.style.top = '';

            const clientX = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
            const clientY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;

            attemptPlacePiece(piece, clientX, clientY);
        };

        function movePiece(cx, cy) {
            piece.style.position = 'fixed';
            piece.style.left = (cx - piece.dataset.offsetX) + 'px';
            piece.style.top = (cy - piece.dataset.offsetY) + 'px';
        }

        piece.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);

        piece.addEventListener('touchstart', handleStart, { passive: false });
        window.addEventListener('touchmove', handleMove, { passive: false });
        window.addEventListener('touchend', handleEnd);
    }

    // Thử đặt khối vào ma trận lưới
    function attemptPlacePiece(piece, cx, cy) {
        const shape = JSON.parse(piece.dataset.shape);
        const color = piece.dataset.color;
        
        // Tìm ô dưới tâm khối hình
        const cells = document.querySelectorAll('.cell');
        let targetCell = null;
        
        cells.forEach(cell => {
            const rect = cell.getBoundingClientRect();
            if (cx >= rect.left && cx <= rect.right && cy >= rect.top && cy <= rect.bottom) {
                targetCell = cell;
            }
        });

        if (!targetCell) return; // Ra ngoài rìa thì không làm gì, tự trả về chỗ cũ

        const baseR = parseInt(targetCell.dataset.row);
        const baseC = parseInt(targetCell.dataset.col);

        // Kiểm tra xem vị trí đặt có hợp lệ không
        let canPlace = true;
        for (let r = 0; r < shape.length; r++) {
            for (let c = 0; c < shape[0].length; c++) {
                if (shape[r][c]) {
                    const gridR = baseR + r;
                    const gridC = baseC + c;
                    
                    if (gridR >= GRID_SIZE || gridC >= GRID_SIZE || gridData[gridR][gridC] !== null) {
                        canPlace = false;
                        break;
                    }
                }
            }
        }

        // Nếu hợp lệ -> Đổ dữ liệu vào bàn cờ
        if (canPlace) {
            for (let r = 0; r < shape.length; r++) {
                for (let c = 0; c < shape[0].length; c++) {
                    if (shape[r][c]) {
                        gridData[baseR + r][baseC + c] = color;
                    }
                }
            }
            score += shape.flat().filter(v => v).length * 10;
            
            // Xóa khối đã đặt thành công khỏi dock slot
            const slot = piece.parentElement;
            slot.innerHTML = ''; 

            drawGrid();
            checkLines();

            // Nếu cả 3 slot đều trống sạch, cấp loạt khối mới
            const remainingPieces = document.querySelectorAll('.piece');
            if (remainingPieces.length === 0) {
                generateDockPieces();
            } else {
                checkGameOver(); // Kiểm tra xem các khối còn lại có bị kẹt cứng không
            }
        }
    }

    // Kiểm tra hàng/cột đầy và tính toán Combo Streak
    function checkLines() {
        let rowsToClear = [];
        let colsToClear = [];

        for (let r = 0; r < GRID_SIZE; r++) {
            if (gridData[r].every(cell => cell !== null)) rowsToClear.push(r);
        }
        for (let c = 0; c < GRID_SIZE; c++) {
            let isColFull = true;
            for (let r = 0; r < GRID_SIZE; r++) {
                if (gridData[r][c] === null) { isColFull = false; break; }
            }
            if (isColFull) colsToClear.push(c);
        }

        const totalLines = rowsToClear.length + colsToClear.length;

        if (totalLines > 0) {
            streak++;
            // Tính điểm đột biến dựa trên combo hàng và chuỗi Streak ăn liên tục
            score += totalLines * 100 * streak;
            
            // Kích hoạt hiệu ứng nổ nhẹ mắt
            rowsToClear.forEach(r => {
                for(let c=0; c<GRID_SIZE; c++) {
                    getGridCell(r, c).classList.add('clear-anim');
                    gridData[r][c] = null;
                }
            });
            colsToClear.forEach(c => {
                for(let r=0; r<GRID_SIZE; r++) {
                    getGridCell(r, c).classList.add('clear-anim');
                    gridData[r][c] = null;
                }
            });

            // Hiển thị Banner Combo
            streakEl.innerText = `Combo X${streak}!`;
            streakEl.style.opacity = '1';

            setTimeout(() => {
                document.querySelectorAll('.cell').forEach(el => el.classList.remove('clear-anim'));
                drawGrid();
            }, 150);

        } else {
            streak = 0; // Đứt mạch streak
            streakEl.style.opacity = '0';
        }

        scoreEl.innerText = score;
        if (score > bestScore) {
            bestScore = score;
            bestScoreEl.innerText = bestScore;
            localStorage.setItem('block_blast_best', bestScore);
        }
    }

    function getGridCell(r, c) {
        return document.querySelector(`.cell[data-row='${r}'][data-col='${c}']`);
    }

    // Thuật toán cốt lõi: Kiểm tra xem các khối còn lại còn khe trống nào nhét vừa không
    function checkGameOver() {
        const remainingPieces = document.querySelectorAll('.piece');
        if (remainingPieces.length === 0) return;

        let anyPieceCanFit = false;

        remainingPieces.forEach(piece => {
            const shape = JSON.parse(piece.dataset.shape);
            
            // Thử giả lập đặt khối này vào TẤT CẢ các vị trí trên bàn cờ 8x8
            for (let r = 0; r <= GRID_SIZE - shape.length; r++) {
                for (let c = 0; c <= GRID_SIZE - shape[0].length; c++) {
                    let canFitAtThisSpot = true;
                    
                    for (let pr = 0; pr < shape.length; pr++) {
                        for (let pc = 0; pc < shape[0].length; pc++) {
                            if (shape[pr][pc] && gridData[r + pr][c + pc] !== null) {
                                canFitAtThisSpot = false;
                                break;
                            }
                        }
                        if (!canFitAtThisSpot) break;
                    }

                    if (canFitAtThisSpot) {
                        anyPieceCanFit = true;
                        // Làm tối mờ hoặc bình thường khối tùy theo trạng thái có đặt được không (Tính năng ẩn cực hay của bản gốc)
                        piece.style.opacity = '1';
                        return;
                    }
                }
            }
            if (!anyPieceCanFit) {
                piece.style.opacity = '0.3'; // Khối nào không vừa bất cứ đâu nữa sẽ tự mờ đi
            }
        });

        if (!anyPieceCanFit) {
            setTimeout(() => {
                document.getElementById('final-score').innerText = score;
                document.getElementById('game-over-screen').style.display = 'flex';
            }, 600);
        }
    }

    function resetGame() {
        gridData = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(null));
        score = 0;
        streak = 0;
        scoreEl.innerText = '0';
        streakEl.style.opacity = '0';
        document.getElementById('game-over-screen').style.display = 'none';
        initGrid();
        drawGrid();
        generateDockPieces();
    }

    // Khởi chạy game
    initGrid();
    generateDockPieces();
</script>
</body>
</html>
