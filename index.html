<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>School Run - Ultimate Master Edition</title>
    <style>
        :root {
            --bg-blue: #dbeafe;
            --text-dark: #1e3a8a;
        }
        body {
            margin: 0; padding: 0; overflow: hidden;
            background-color: var(--bg-blue);
            font-family: 'SF Pro Display', -apple-system, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; touch-action: none; user-select: none;
        }
        #ui {
            position: absolute; top: 20px; width: 100%; max-width: 400px;
            display: flex; justify-content: space-between; padding: 0 20px;
            box-sizing: border-box; z-index: 10; pointer-events: none;
        }
        .stat {
            background: rgba(255, 255, 255, 0.9);
            padding: 8px 14px; border-radius: 15px;
            box-shadow: 0 4px 10px rgba(30, 58, 138, 0.15);
            font-weight: bold; color: var(--text-dark);
            font-size: 14px; display: flex; flex-direction: column; align-items: center;
        }
        .stat span { font-size: 18px; font-weight: 900; color: #2563eb; }
        
        #powerup-bar {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 200px; height: 10px; background: rgba(255,255,255,0.5);
            border-radius: 5px; display: none; overflow: hidden; border: 1px solid #fff;
        }
        #powerup-progress {
            width: 100%; height: 100%; background: #00e676; transition: width 0.1s linear;
        }
        #game-over {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(219, 234, 254, 0.97);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100;
        }
        button {
            padding: 15px 45px; font-size: 18px; font-weight: 800;
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: white; border: none; border-radius: 16px;
            cursor: pointer; margin-top: 25px; box-shadow: 0 8px 20px rgba(37, 99, 235, 0.4);
        }
    </style>
</head>
<body>

<div id="ui">
    <div class="stat">SCORE<span id="score">0</span></div>
    <div class="stat">COINS<span id="coins" style="color: #ffaa00;">0</span></div>
    <div class="stat">SPEED<span id="speed">1.0x</span></div>
</div>

<div id="powerup-bar"><div id="powerup-progress"></div></div>

<canvas id="gameCanvas"></canvas>

<div id="game-over">
    <h1 style="color: #ef4444; font-size: 42px; font-weight: 900; margin-bottom: 5px;">TOANG RỒI!</h1>
    <p style="font-size: 16px; color: #1e40af; font-weight: bold; margin: 5px 0;">TỔNG ĐIỂM CỦA BẠN</p>
    <div id="final-score" style="font-size: 50px; font-weight: 900; color: #2563eb;">0</div>
    <button onclick="resetGame()">CHẠY LẠI NGAY</button>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const coinsEl = document.getElementById('coins');
    const speedEl = document.getElementById('speed');
    const gameOverScreen = document.getElementById('game-over');
    const pBar = document.getElementById('powerup-bar');
    const pProgress = document.getElementById('powerup-progress');

    let gameActive = true;
    let score = 0;
    let coins = 0;
    let gameSpeed = 5;
    
    // Hệ thống Nhân vật
    const player = {
        lane: 1, x: 0, y: 0, width: 46, height: 75, targetX: 0,
        jumpY: 0, isJumping: false, isSliding: false, slideTimer: 0,
        activePowerup: null, powerupTime: 0, maxPowerupTime: 0
    };

    let obstacles = [];
    let collectables = []; // Vàng và Item bổ trợ
    let particles = [];

    function resize() {
        canvas.width = Math.min(window.innerWidth, 400);
        canvas.height = window.innerHeight;
        player.targetX = (player.lane * (canvas.width / 3)) + (canvas.width / 6) - player.width/2;
        player.x = player.targetX;
        player.y = canvas.height - 160;
    }

    // Điều khiển bàn phím
    window.addEventListener('keydown', (e) => {
        if (!gameActive) return;
        if ((e.key === 'ArrowLeft' || e.key === 'a') && player.lane > 0) player.lane--;
        if ((e.key === 'ArrowRight' || e.key === 'd') && player.lane < 2) player.lane++;
        if ((e.key === 'ArrowUp' || e.key === 'w') && !player.isJumping && !player.isSliding) {
            player.isJumping = true;
            let jumpHeight = 0;
            const jumpInterval = setInterval(() => {
                if(!gameActive) { clearInterval(jumpInterval); return; }
                jumpHeight += 6;
                player.jumpY = Math.sin(jumpHeight * (Math.PI / 180)) * 130;
                if (jumpHeight >= 180) { player.isJumping = false; player.jumpY = 0; clearInterval(jumpInterval); }
            }, 6);
        }
        if ((e.key === 'ArrowDown' || e.key === 's') && !player.isJumping && !player.isSliding) {
            player.isSliding = true;
            player.slideTimer = 35; // Co người né vật cản cao
        }
    });

    // Vuốt trên Điện thoại
    let touchStartX = 0; let touchStartY = 0;
    window.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; });
    window.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].clientX - touchStartX; const dy = e.changedTouches[0].clientY - touchStartY;
        if (Math.abs(dx) > Math.abs(dy)) {
            if (dx > 35 && player.lane < 2) player.lane++;
            else if (dx < -35 && player.lane > 0) player.lane--;
        } else {
            if (dy < -35) window.dispatchEvent(new KeyboardEvent('keydown', {'key': 'ArrowUp'}));
            else if (dy > 35) window.dispatchEvent(new KeyboardEvent('keydown', {'key': 'ArrowDown'}));
        }
    });

    // Sinh Vật Cản & Vật Phẩm Ngẫu Nhiên
    function spawnSpawns() {
        if (Math.random() < 0.02) { // Sinh vật cản
            const lane = Math.floor(Math.random() * 3);
            const type = Math.random() > 0.45 ? 'low' : 'high';
            obstacles.push({
                lane: lane, y: -100, width: 64, height: type === 'low' ? 38 : 95, type: type,
                color: type === 'low' ? '#ff1744' : '#f50057' // Đỏ rực rỡ hoặc Hồng Hot-Pink
            });
        }
        if (Math.random() < 0.04) { // Sinh Vàng hoặc Power-up
            const lane = Math.floor(Math.random() * 3);
            // Kiểm tra tránh trùng tọa độ vật cản vừa tạo
            if(obstacles.some(o => o.lane === lane && o.y < 100)) return;
            
            let type = 'coin';
            if (Math.random() < 0.15) {
                type = Math.random() > 0.5 ? 'magnet' : 'shield';
            }
            collectables.push({ lane: lane, y: -50, type: type, radius: type === 'coin' ? 12 : 16 });
        }
    }

    // Hiệu ứng nổ hạt tung tóe khi ăn điểm hoặc chết
    function createExplosion(x, y, color, count = 12) {
        for (let i = 0; i < count; i++) {
            particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * 8, vy: (Math.random() - 0.5) * 8,
                radius: Math.random() * 4 + 2, color: color, alpha: 1, decay: Math.random() * 0.03 + 0.02
            });
        }
    }

    function update() {
        if (!gameActive) return;

        score++;
        scoreEl.innerText = Math.floor(score / 10);
        gameSpeed = 5.5 + (score / 1200);
        speedEl.innerText = (gameSpeed / 5.5).toFixed(1) + 'x';

        // Di chuyển làn mượt
        player.targetX = (player.lane * (canvas.width / 3)) + (canvas.width / 6) - player.width/2;
        player.x += (player.targetX - player.x) * 0.22;

        if (player.slideTimer > 0) {
            player.slideTimer--;
            if (player.slideTimer <= 0) player.isSliding = false;
        }

        // Đếm ngược thời gian hiệu lực của Power-up
        if (player.activePowerup) {
            player.powerupTime--;
            pBar.style.display = 'block';
            pProgress.style.width = (player.powerupTime / player.maxPowerupTime * 100) + '%';
            pProgress.style.backgroundColor = player.activePowerup === 'magnet' ? '#00e676' : '#2979ff';
            if (player.powerupTime <= 0) { player.activePowerup = null; pBar.style.display = 'none'; }
        }

        spawnSpawns();

        // Xử lý logic Vật phẩm (Coins / Power-ups)
        for (let i = collectables.length - 1; i >= 0; i--) {
            let c = collectables[i];
            c.y += gameSpeed;
            
            let cX = (c.lane * (canvas.width / 3)) + (canvas.width / 6);
            let pX = player.x + player.width/2;
            let pY = player.y - player.jumpY + player.height/2;

            // Tính năng NAM CHÂM: Tự động hút vàng từ xa vào người
            if (player.activePowerup === 'magnet' && c.type === 'coin' && c.y > 100) {
                cX += (pX - cX) * 0.25;
                c.y += (pY - c.y) * 0.25;
            }

            // Kiểm tra va chạm ăn vật phẩm
            let dist = Math.hypot(cX - pX, c.y - pY);
            if (dist < c.radius + player.width) {
                if (c.type === 'coin') {
                    coins++; coinsEl.innerText = coins;
                    createExplosion(cX, c.y, '#ffea00', 6);
                } else {
                    // Nhặt được kỹ năng bổ trợ
                    player.activePowerup = c.type;
                    player.powerupTime = 400; // chạy được khoảng 6-7 giây
                    player.maxPowerupTime = 400;
                    createExplosion(cX, c.y, c.type === 'magnet' ? '#00e676' : '#2979ff', 15);
                }
                collectables.splice(i, 1);
                continue;
            }
            if (c.y > canvas.height) collectables.splice(i, 1);
        }

        // Xử lý logic Vật cản
        for (let i = obstacles.length - 1; i >= 0; i--) {
            let o = obstacles[i];
            o.y += gameSpeed;

            let pX = player.x;
            let pY = player.y - player.jumpY;
            let pW = player.width;
            let pH = player.isSliding ? player.height/2 : player.height;
            let realPY = player.isSliding ? pY + player.height/2 : pY;
            let oX = (o.lane * (canvas.width / 3)) + (canvas.width / 6) - o.width/2;

            if (pX < oX + o.width && pX + pW > oX && realPY < o.y + o.height && realPY + pH > o.y) {
                if (o.type === 'high' && player.isSliding) { /* Né thành công */ } 
                else if (o.type === 'low' && player.isJumping && player.jumpY > 35) { /* Né thành công */ } 
                else {
                    // NẾU CÓ KHIÊN BẤT TỬ: Phá hủy vật cản bảo vệ mạng sống
                    if (player.activePowerup === 'shield') {
                        player.activePowerup = null; pBar.style.display = 'none';
                        createExplosion(oX + o.width/2, o.y + o.height/2, '#2979ff', 25);
                        obstacles.splice(i, 1);
                        continue;
                    }

                    // THUA CUỘC: Nổ tung xác pháo khối hình nhân vật
                    gameActive = false;
                    createExplosion(player.x + player.width/2, realPY + pH/2, '#1e40af', 40);
                    setTimeout(() => {
                        document.getElementById('final-score').innerText = Math.floor(score / 10) + coins * 10;
                        gameOverScreen.style.display = 'flex';
                    }, 500);
                }
            }
            if (o.y > canvas.height) obstacles.splice(i, 1);
        }

        // Cập nhật hạt hiệu ứng nổ
        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i]; p.x += p.vx; p.y += p.vy; p.alpha -= p.decay;
            if (p.alpha <= 0) particles.splice(i, 1);
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Vẽ 3 làn đường kẻ phong cách Neon Denim
        ctx.fillStyle = '#93c5fd';
        for(let i=1; i<3; i++) { ctx.fillRect(i * (canvas.width/3) - 2, 0, 4, canvas.height); }

        // Vẽ Coins & Kỹ năng
        collectables.forEach(c => {
            let cX = (c.lane * (canvas.width / 3)) + (canvas.width / 6);
            ctx.beginPath();
            if (c.type === 'coin') {
                ctx.fillStyle = '#ffea00'; ctx.shadowBlur = 12; ctx.shadowColor = '#ffea00';
                ctx.arc(cX, c.y, c.radius, 0, Math.PI * 2); ctx.fill();
            } else if (c.type === 'magnet') { // Nam châm xanh neon
                ctx.fillStyle = '#00e676'; ctx.shadowBlur = 15; ctx.shadowColor = '#00e676';
                ctx.arc(cX, c.y, c.radius, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#fff'; ctx.font = 'bold 12px sans-serif'; ctx.fillText('M', cX - 5, c.y + 4);
            } else { // Khiên bảo vệ xanh dương đậm đặc
                ctx.fillStyle = '#2979ff'; ctx.shadowBlur = 15; ctx.shadowColor = '#2979ff';
                ctx.arc(cX, c.y, c.radius, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#fff'; ctx.font = 'bold 12px sans-serif'; ctx.fillText('S', cX - 4, c.y + 4);
            }
            ctx.shadowBlur = 0;
        });

        // Vẽ Vật Cản Sắc Màu Nổi Bật
        obstacles.forEach(o => {
            let oX = (o.lane * (canvas.width / 3)) + (canvas.width / 6) - o.width/2;
            ctx.fillStyle = o.color; ctx.shadowBlur = 15; ctx.shadowColor = o.color;
            if (o.type === 'low') {
                ctx.fillRect(oX, o.y, o.width, o.height);
            } else {
                ctx.fillRect(oX, o.y, o.width, 22); ctx.fillRect(oX, o.y, 12, o.height); ctx.fillRect(oX + o.width - 12, o.y, 12, o.height);
            }
            ctx.shadowBlur = 0;
        });

        // Vẽ Hạt Hiệu Ứng Nổ
        particles.forEach(p => {
            ctx.save(); ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fill(); ctx.restore();
        });

        // Vẽ Nhân Vật Chính (Khối xanh dương sẫm)
        if (gameActive || particles.length > 0) {
            ctx.fillStyle = '#1e40af';
            let pDrawH = player.isSliding ? player.height / 2 : player.height;
            let pDrawY = player.isSliding ? (player.y + player.height/2) : (player.y - player.jumpY);
            
            ctx.shadowBlur = 20; ctx.shadowColor = 'rgba(30, 64, 175, 0.4)';
            ctx.fillRect(player.x, pDrawY, player.width, pDrawH);
            
            // Vẽ hào quang bảo vệ quanh nhân vật nếu đang sở hữu Khiên
            if (player.activePowerup === 'shield') {
                ctx.strokeStyle = '#2979ff'; ctx.lineWidth = 4; ctx.shadowColor = '#2979ff'; ctx.shadowBlur = 15;
                ctx.strokeRect(player.x - 6, pDrawY - 6, player.width + 12, pDrawH + 12);
            }
            ctx.shadowBlur = 0;
        }

        update();
        requestAnimationFrame(draw);
    }

    function resetGame() {
        score = 0; coins = 0; gameSpeed = 5.5; obstacles = []; collectables = []; particles = []; gameActive = true;
        player.lane = 1; player.activePowerup = null; pBar.style.display = 'none';
        coinsEl.innerText = '0'; scoreEl.innerText = '0'; gameOverScreen.style.display = 'none';
    }

    resize();
    window.addEventListener('resize', resize);
    draw();
</script>
</body>
</html>
