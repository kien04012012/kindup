<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Runner - Final Fixed</title>
    <style>
        :root {
            --bg-dark-blue: #0b132b;
            --text-neon: #00f5ff;
        }
        body {
            margin: 0; padding: 0; overflow: hidden;
            background-color: var(--bg-dark-blue);
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; touch-action: none; user-select: none;
        }
        #ui {
            position: absolute; top: 25px; width: 100%; max-width: 400px;
            display: flex; justify-content: space-between; padding: 0 25px;
            box-sizing: border-box; z-index: 10; pointer-events: none;
        }
        .stat {
            background: rgba(11, 19, 43, 0.75);
            padding: 10px 16px; border-radius: 16px;
            border: 1px solid rgba(0, 245, 255, 0.2);
            backdrop-filter: blur(8px);
            font-weight: 800; color: #ffffff; letter-spacing: 1px;
            font-size: 11px; display: flex; flex-direction: column; align-items: center;
        }
        .stat span { font-size: 20px; font-weight: 900; color: var(--text-neon); text-shadow: 0 0 8px var(--text-neon); }
        
        #powerup-bar {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: 220px; height: 8px; background: rgba(255,255,255,0.1);
            border-radius: 10px; display: none; overflow: hidden; border: 1px solid rgba(0,245,255,0.3);
        }
        #powerup-progress { width: 100%; height: 100%; background: #00ff88; }
        
        #game-over {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 19, 43, 0.95);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; backdrop-filter: blur(10px);
        }
        h1 {
            font-size: 42px; font-weight: 900; background: linear-gradient(135deg, #ff0055, #ff5500);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }
        button {
            padding: 16px 45px; font-size: 18px; font-weight: 800;
            background: linear-gradient(135deg, #00f5ff 0%, #0055ff 100%);
            color: white; border: none; border-radius: 20px;
            cursor: pointer; margin-top: 30px; box-shadow: 0 0 20px rgba(0, 245, 255, 0.4);
        }
    </style>
</head>
<body>

<div id="ui">
    <div class="stat">SCORE<span id="score">0</span></div>
    <div class="stat">COINS<span id="coins" style="color: #ffcc00; text-shadow: 0 0 8px #ffcc00;">0</span></div>
    <div class="stat">SPEED<span id="speed">1.0x</span></div>
</div>

<div id="powerup-bar"><div id="powerup-progress"></div></div>

<canvas id="gameCanvas"></canvas>

<div id="game-over">
    <h1>GAME OVER</h1>
    <p style="font-size: 14px; color: #8ba0b5; font-weight: bold; letter-spacing: 2px; margin: 5px 0;">TOTAL SCORE</p>
    <div id="final-score" style="font-size: 55px; font-weight: 900; color: #00f5ff; text-shadow: 0 0 15px #00f5ff;">0</div>
    <button onclick="resetGame()">CHƠI LẠI</button>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const coinsEl = document.getElementById('coins');
    const speedEl = document.getElementById('speed');
    const gameOverScreen = document.getElementById('game-over');
    const pBar = document.getElementById('powerup-bar');
    const pProgress = document.getElementById('powerup-progress');

    let gameActive = true;
    let score = 0; let coins = 0; let gameSpeed = 5.5;
    let animFrame = 0;
    
    const player = {
        lane: 1, x: 0, y: 0, width: 50, height: 80, targetX: 0,
        jumpY: 0, isJumping: false, isSliding: false, slideTimer: 0,
        activePowerup: null, powerupTime: 0, maxPowerupTime: 0
    };

    let obstacles = []; let collectables = []; let particles = []; let speedLines = [];

    function resize() {
        canvas.width = Math.min(window.innerWidth, 400);
        canvas.height = window.innerHeight;
        player.targetX = (player.lane * (canvas.width / 3)) + (canvas.width / 6) - player.width/2;
        player.x = player.targetX;
        player.y = canvas.height - 160; // Điều chỉnh lại vị trí đứng an toàn
        
        speedLines = [];
        for(let i=0; i<12; i++) {
            speedLines.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, len: Math.random() * 30 + 20 });
        }
    }

    // Điều khiển bàn phím
    window.addEventListener('keydown', (e) => {
        if (!gameActive) return;
        if ((e.key === 'ArrowLeft' || e.key === 'a') && player.lane > 0) player.lane--;
        if ((e.key === 'ArrowRight' || e.key === 'd') && player.lane < 2) player.lane++;
        if ((e.key === 'ArrowUp' || e.key === 'w') && !player.isJumping && !player.isSliding) {
            player.isJumping = true;
            let jumpHeight = 0;
            const jumpInterval = setInterval(() => {
                if(!gameActive) { clearInterval(jumpInterval); return; }
                jumpHeight += 6;
                player.jumpY = Math.sin(jumpHeight * (Math.PI / 180)) * 135;
                if (jumpHeight >= 180) { player.isJumping = false; player.jumpY = 0; clearInterval(jumpInterval); }
            }, 5);
        }
        if ((e.key === 'ArrowDown' || e.key === 's') && !player.isJumping && !player.isSliding) {
            player.isSliding = true;
            player.slideTimer = 35;
        }
    });

    // Vuốt màn hình điện thoại
    let touchStartX = 0; let touchStartY = 0;
    window.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; });
    window.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].clientX - touchStartX; const dy = e.changedTouches[0].clientY - touchStartY;
        if (Math.abs(dx) > Math.abs(dy)) {
            if (dx > 35 && player.lane < 2) player.lane++;
            else if (dx < -35 && player.lane > 0) player.lane--;
        } else {
            if (dy < -35) window.dispatchEvent(new KeyboardEvent('keydown', {'key': 'ArrowUp'}));
            else if (dy > 35) window.dispatchEvent(new KeyboardEvent('keydown', {'key': 'ArrowDown'}));
        }
    });

    function spawnObjects() {
        if (Math.random() < 0.02) {
            const lane = Math.floor(Math.random() * 3);
            const type = Math.random() > 0.5 ? 'low' : 'high';
            obstacles.push({
                lane: lane, y: -100, width: 66, height: type === 'low' ? 35 : 85, type: type,
                color: type === 'low' ? '#ff0055' : '#ff9900'
            });
        }
        if (Math.random() < 0.04) {
            const lane = Math.floor(Math.random() * 3);
            if(obstacles.some(o => o.lane === lane && o.y < 120)) return;
            let type = 'coin';
            if (Math.random() < 0.12) type = Math.random() > 0.5 ? 'magnet' : 'shield';
            collectables.push({ lane: lane, y: -40, type: type, angle: 0 });
        }
    }

    function createExplosion(x, y, color, count = 15) {
        for (let i = 0; i < count; i++) {
            particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * 8, vy: (Math.random() - 0.5) * 8,
                radius: Math.random() * 3 + 1, color: color, alpha: 1, decay: Math.random() * 0.02 + 0.02
            });
        }
    }

    // Tách biệt hoàn toàn phần xử lý logic chuyển động
    function update() {
        if (!gameActive) return;

        score++;
        scoreEl.innerText = Math.floor(score / 10);
        gameSpeed = 5.5 + (score / 1200);
        speedEl.innerText = (gameSpeed / 5.5).toFixed(1) + 'x';
        animFrame += 0.15;

        speedLines.forEach(line => {
            line.y += gameSpeed * 1.5;
            if(line.y > canvas.height) { line.y = -50; line.x = Math.random() * canvas.width; }
        });

        player.targetX = (player.lane * (canvas.width / 3)) + (canvas.width / 6) - player.width/2;
        player.x += (player.targetX - player.x) * 0.22;

        if (player.slideTimer > 0) {
            player.slideTimer--;
            if (player.slideTimer <= 0) player.isSliding = false;
        }

        if (player.activePowerup) {
            player.powerupTime--;
            pBar.style.display = 'block';
            pProgress.style.width = (player.powerupTime / player.maxPowerupTime * 100) + '%';
            if (player.powerupTime <= 0) { player.activePowerup = null; pBar.style.display = 'none'; }
        }

        spawnObjects();

        // Xu và kỹ năng bổ trợ
        for (let i = collectables.length - 1; i >= 0; i--) {
            let c = collectables[i]; c.y += gameSpeed; c.angle += 0.06;
            let cX = (c.lane * (canvas.width / 3)) + (canvas.width / 6);
            let pX = player.x + player.width/2;
            let pY = player.y - player.jumpY + player.height/2;

            if (player.activePowerup === 'magnet' && c.type === 'coin' && c.y > 50) {
                cX += (pX - cX) * 0.3; c.y += (pY - c.y) * 0.3;
            }

            if (Math.hypot(cX - pX, c.y - pY) < 40) {
                if (c.type === 'coin') { coins++; coinsEl.innerText = coins; createExplosion(cX, c.y, '#ffcc00', 6); } 
                else { player.activePowerup = c.type; player.powerupTime = 400; player.maxPowerupTime = 400; createExplosion(cX, c.y, '#00f5ff', 12); }
                collectables.splice(i, 1); continue;
            }
            if (c.y > canvas.height) collectables.splice(i, 1);
        }

        // Kiểm tra vật cản va chạm
        for (let i = obstacles.length - 1; i >= 0; i--) {
            let o = obstacles[i]; o.y += gameSpeed;
            let pX = player.x; let pY = player.y - player.jumpY;
            let pW = player.width; let pH = player.isSliding ? player.height/2 : player.height;
            let realPY = player.isSliding ? pY + player.height/2 : pY;
            let oX = (o.lane * (canvas.width / 3)) + (canvas.width / 6) - o.width/2;

            if (pX < oX + o.width && pX + pW > oX && realPY < o.y + o.height && realPY + pH > o.y) {
                if (o.type === 'high' && player.isSliding) {} 
                else if (o.type === 'low' && player.isJumping && player.jumpY > 30) {} 
                else {
                    if (player.activePowerup === 'shield') { player.activePowerup = null; pBar.style.display = 'none'; createExplosion(oX + o.width/2, o.y + o.height/2, '#00f5ff', 20); obstacles.splice(i, 1); continue; }
                    gameActive = false;
                    createExplosion(player.x + player.width/2, realPY + pH/2, '#ff0055', 25);
                    setTimeout(() => { document.getElementById('final-score').innerText = Math.floor(score / 10) + coins * 15; gameOverScreen.style.display = 'flex'; }, 500);
                }
            }
            if (o.y > canvas.height) obstacles.splice(i, 1);
        }

        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i]; p.x += p.vx; p.y += p.vy; p.alpha -= p.decay;
            if (p.alpha <= 0) particles.splice(i, 1);
        }
    }

    // Hàm vẽ nhân vật an toàn 100%
    function drawPlayer(x, y, w, h) {
        ctx.save();
        let bobbing = Math.sin(animFrame) * 3;
        if (player.isJumping || player.isSliding) bobbing = 0;

        let pY = y + bobbing;
        let pH = h;

        if (player.isSliding) { pH = h * 0.5; pY = y + h * 0.5; }
        let cx = x + w / 2;

        // Ván trượt Neon
        ctx.shadowBlur = 15; ctx.shadowColor = '#00f5ff';
        ctx.fillStyle = '#00f5ff'; ctx.beginPath(); ctx.ellipse(cx, pY + pH, w * 0.6, 5, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.ellipse(cx, pY + pH, w * 0.4, 2.5, 0, 0, Math.PI * 2); ctx.fill();
        ctx.shadowBlur = 0;

        if (!player.isSliding) {
            // Đôi chân
            ctx.fillStyle = '#1e293b';
            ctx.fillRect(cx - 12, pY + pH - 20, 7, 20); ctx.fillRect(cx + 5, pY + pH - 20, 7, 20);
            ctx.fillStyle = '#ff0055';
            ctx.fillRect(cx - 14, pY + pH - 5, 9, 6); ctx.fillRect(cx + 3, pY + pH - 5, 9, 6);
            // Balo Jetpack
            ctx.fillStyle = '#475569'; ctx.fillRect(cx - w/2 - 2, pY + 20, 6, 26);
            if (player.isJumping && player.jumpY > 15) {
                ctx.shadowBlur = 10; ctx.shadowColor = '#ff5500';
                let fire = ctx.createLinearGradient(cx - w/2 - 2, pY + 46, cx - w/2 - 2, pY + 65);
                fire.addColorStop(0, '#ffea00'); fire.addColorStop(1, 'transparent');
                ctx.fillStyle = fire; ctx.fillRect(cx - w/2 - 2, pY + 46, 5, 15);
            }
        }

        // Thân áo Hoodie
        let bodyH = player.isSliding ? pH * 0.75 : pH * 0.52;
        let bodyY = player.isSliding ? pY : pY + 14;
        let bodyGrad = ctx.createLinearGradient(x, bodyY, x + w, bodyY + bodyH);
        bodyGrad.addColorStop(0, '#3b82f6'); bodyGrad.addColorStop(1, '#1d4ed8');
        ctx.fillStyle = bodyGrad; ctx.fillRect(cx - w * 0.35, bodyY, w * 0.7, bodyH);

        // Đầu và tóc vàng
        let headRadius = player.isSliding ? 11 : 12.5;
        let headY = player.isSliding ? pY - 2 : pY + 5;
        ctx.fillStyle = '#ffdbac'; ctx.beginPath(); ctx.arc(cx, headY, headRadius, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#ffea00'; ctx.beginPath(); ctx.arc(cx, headY - 4, headRadius * 0.9, Math.PI, 0); ctx.fill();
        ctx.beginPath(); ctx.moveTo(cx - 9, headY - 4); ctx.lineTo(cx - 4, headY + 2); ctx.lineTo(cx, headY - 4); ctx.lineTo(cx + 4, headY + 2); ctx.lineTo(cx + 9, headY - 4); ctx.fill();

        // Kính bảo hộ Cyberpunk
        ctx.shadowBlur = 10; ctx.shadowColor = '#00f5ff'; ctx.fillStyle = '#00f5ff'; ctx.fillRect(cx - 8, headY - 1, 16, 4);
        ctx.shadowBlur = 0;

        // Vòng bảo vệ KHIÊN
        if (player.activePowerup === 'shield') {
            ctx.strokeStyle = '#00f5ff'; ctx.lineWidth = 3; ctx.shadowColor = '#00f5ff'; ctx.shadowBlur = 15;
            ctx.beginPath(); ctx.arc(cx, bodyY + bodyH/2, w, 0, Math.PI*2); ctx.stroke();
        }
        ctx.restore(); ctx.shadowBlur = 0;
    }

    // Hàm vẽ vòng lặp đồ họa chính
    function draw() {
        // GỌI UPDATE TRƯỚC KHI VẼ ĐỂ TRÁNH TRỐNG MÀN HÌNH
        update();

        ctx.fillStyle = '#0b132b'; ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Vệt nền tốc độ chạy dọc
        ctx.strokeStyle = 'rgba(0, 245, 255, 0.08)'; ctx.lineWidth = 1.5;
        speedLines.forEach(line => { ctx.beginPath(); ctx.moveTo(line.x, line.y); ctx.lineTo(line.x, line.y + line.len); ctx.stroke(); });

        // 3 làn đường chạy
        for (let i = 1; i < 3; i++) {
            let lineX = i * (canvas.width / 3);
            let grad = ctx.createLinearGradient(lineX, 0, lineX + 4, canvas.height);
            grad.addColorStop(0, '#1e3a8a'); grad.addColorStop(0.5, '#00f5ff'); grad.addColorStop(1, '#1e3a8a');
            ctx.fillStyle = grad; ctx.shadowBlur = 10; ctx.shadowColor = '#00f5ff';
            ctx.fillRect(lineX - 1.5, 0, 3, canvas.height); ctx.shadowBlur = 0;
        }

        // Xu và Item kỹ năng xoay 3D
        collectables.forEach(c => {
            let cX = (c.lane * (canvas.width / 3)) + (canvas.width / 6);
            ctx.save(); ctx.translate(cX, c.y); ctx.scale(Math.sin(c.angle), 1);
            ctx.shadowBlur = 15;
            if (c.type === 'coin') {
                ctx.fillStyle = '#ffcc00'; ctx.shadowColor = '#ffcc00';
                ctx.beginPath(); ctx.arc(0, 0, 12, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#ffea00'; ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI * 2); ctx.fill();
            } else {
                ctx.fillStyle = c.type === 'magnet' ? '#00ffaa' : '#00f5ff'; ctx.shadowColor = ctx.fillStyle;
                ctx.beginPath(); ctx.arc(0, 0, 15, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#fff'; ctx.font = 'bold 11px Arial'; ctx.fillText(c.type === 'magnet' ? '🧲' : '🛡️', -7, 4);
            }
            ctx.restore(); ctx.shadowBlur = 0;
        });

        // Vật cản rực rỡ đổ bóng Neon
        obstacles.forEach(o => {
            let oX = (o.lane * (canvas.width / 3)) + (canvas.width / 6) - o.width/2;
            ctx.shadowBlur = 18; ctx.shadowColor = o.color; ctx.fillStyle = o.color;
            if (o.type === 'low') {
                let g = ctx.createLinearGradient(oX, o.y, oX, o.y + o.height);
                g.addColorStop(0, '#ffffff'); g.addColorStop(0.3, o.color); g.addColorStop(1, '#660022');
                ctx.fillStyle = g; ctx.fillRect(oX, o.y, o.width, o.height);
            } else {
                ctx.fillRect(oX, o.y, o.width, 18);
                ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.fillRect(oX, o.y + 6, o.width, 6);
                ctx.fillStyle = o.color; ctx.fillRect(oX, o.y, 10, o.height); ctx.fillRect(oX + o.width - 10, o.y, 10, o.height);
            }
            ctx.shadowBlur = 0;
        });

        // Hạt bụi nổ vỡ vụn
        particles.forEach(p => {
            ctx.save(); ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fill(); ctx.restore();
        });

        // Vẽ nhân vật lướt ván hoạt họa
        if (gameActive) {
            drawPlayer(player.x, player.y - player.jumpY, player.width, player.height);
        }

        requestAnimationFrame(draw);
    }

    function resetGame() {
        score = 0; coins = 0; gameSpeed = 5.5; obstacles = []; collectables = []; particles = []; gameActive = true;
        player.lane = 1; player.activePowerup = null; pBar.style.display = 'none';
        coinsEl.innerText = '0'; scoreEl.innerText = '0'; gameOverScreen.style.display = 'none';
    }

    resize();
    window.addEventListener('resize', resize);
    draw();
</script>
</body>
</html>
